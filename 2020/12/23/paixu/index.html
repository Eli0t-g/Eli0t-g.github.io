<p>最近开始学习算法，看了半天发现并没有想象的那么简单。最后再总结一下，大致如下</p>
</blockquote>
<p>第一个是桶排序，这个排序方法易懂，但缺点也多，比如耗费空间较多，对排序的数的大小也有要求，难度也较高。桶排序的代码如下：</p>
<figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;stdio.h&gt;</span></span></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	<span class="keyword">int</span> book[<span class="number">1001</span>], i, j, t, n;  <span class="comment">//我们需要1001个桶，来表示0~1000之间每一个数出现的次数</span></span><br><span class="line">	<span class="keyword">for</span> (i = <span class="number">0</span>; i &lt;= <span class="number">1000</span>; i++)  <span class="comment">//初始化</span></span><br><span class="line">		book[i] = <span class="number">0</span>;</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;请输入有多少个数需要排序\n&quot;</span>);</span><br><span class="line">	scanf_s(<span class="string">&quot;%d&quot;</span>, &amp;n,<span class="keyword">sizeof</span>(n));  <span class="comment">//输入共有多少数排序</span></span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;请依次输入要排序的数(数字范围是0~1000))\n&quot;</span>);</span><br><span class="line">	<span class="keyword">for</span> (i = <span class="number">1</span>; i &lt;= n; i++)  <span class="comment">//循环读入n个数，并进行桶排序 </span></span><br><span class="line">	&#123;</span><br><span class="line">		scanf_s(<span class="string">&quot;%d&quot;</span>, &amp;t,<span class="keyword">sizeof</span>(t));</span><br><span class="line">		book[t]++;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">for</span> (i = <span class="number">1000</span>; i &gt;= <span class="number">0</span>; i--)  <span class="comment">//依次判断a[0]~a[10]</span></span><br><span class="line">		<span class="keyword">for</span> (j = <span class="number">1</span>; j &lt;= book[i]; j++)</span><br><span class="line">			<span class="built_in">printf</span>(<span class="string">&quot;%d &quot;</span>, i);</span><br><span class="line"></span><br><span class="line">	<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>由于第一种方法缺点较多，所以有了第二种排序方法，叫做冒泡排序。</p>
