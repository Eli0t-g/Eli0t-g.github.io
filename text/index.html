                        <h1 id="小平之路"><a href="#小平之路" class="headerlink" title="小平之路"></a>小平之路</h1><blockquote>
<p>原本以为是难熬的一天，想不到被它打破了。</p>
</blockquote>
<p>一开始听到这个名字时，心中对它并没有什么感觉，但是考虑到能出去玩心中还是有点小激动。可能是因为时间比较赶加上天气炎热，在去的过程中十分烦躁，并没有表现得像其它人一样激动。</p>
<p>到了第一站，参观了一下烈士的纪念碑，纪念碑旁边全是绿树，看得出来，这些树明显被人修饰过，让这里显得十分庄重。我怀着一颗敬畏的心登上阶梯，看着纪念碑思考了许多后便走了。</p>
